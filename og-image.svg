<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9dcff"/>
      <stop offset="0.55" stop-color="#d7efff"/>
      <stop offset="1" stop-color="#f3fbff"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe8f4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <circle cx="990" cy="130" r="70" fill="#fff7d6"/>

  <!-- mountains -->
  <path d="M0 330 L210 200 L360 300 L520 190 L700 320 L900 210 L1200 330 L1200 330 L0 330 Z" fill="#c4d8ec"/>
  <path d="M0 380 L260 250 L470 360 L720 240 L980 360 L1200 270 L1200 380 Z" fill="#aec7e2"/>

  <!-- snow slope -->
  <path d="M0 470 L1200 360 L1200 630 L0 630 Z" fill="url(#snow)"/>
  <path d="M0 470 L1200 360" stroke="#eaf4fd" stroke-width="6" fill="none"/>

  <!-- brick wall -->
  <g>
    <rect x="900" y="360" width="46" height="150" fill="#b0573f"/>
    <g stroke="rgba(255,255,255,.25)" stroke-width="2">
      <line x1="900" y1="384" x2="946" y2="384"/><line x1="900" y1="408" x2="946" y2="408"/>
      <line x1="900" y1="432" x2="946" y2="432"/><line x1="900" y1="456" x2="946" y2="456"/>
      <line x1="923" y1="360" x2="923" y2="384"/><line x1="900" y1="384" x2="900" y2="408"/>
    </g>
    <ellipse cx="923" cy="360" rx="26" ry="7" fill="#fff"/>
  </g>

  <!-- skier mid-backflip over the wall -->
  <g transform="translate(720 250) rotate(150)" stroke-linecap="round" fill="none">
    <path d="M-46 34 H50" stroke="#ffcf33" stroke-width="9"/>
    <path d="M-8 34 L0 8 M10 34 L2 8" stroke="#2b3a67" stroke-width="9"/>
    <path d="M0 8 L4 -20" stroke="#e8442c" stroke-width="12"/>
    <path d="M2 -6 L24 2" stroke="#e8442c" stroke-width="7"/>
    <circle cx="6" cy="-28" r="9" fill="#ffd9b0" stroke="none"/>
    <path d="M-4 -29 a9 9 0 0 1 18 0 Z" fill="#1f2c47" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="150" font-size="92" font-weight="900" fill="#0e2f4d" letter-spacing="-2">SKI STUNT</text>
  <text x="80" y="245" font-size="92" font-weight="900" fill="#e8442c" letter-spacing="-2">SIMULATOR</text>
  <text x="84" y="300" font-size="30" font-weight="700" fill="#2b4a66" letter-spacing="1">Flip over the wall. Free in your browser.</text>
</svg>
