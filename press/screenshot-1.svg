<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1296" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9dcff"/><stop offset="0.6" stop-color="#d7efff"/><stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#dbe8f4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1296" fill="url(#sky)"/>
  <circle cx="470" cy="230" r="66" fill="#fff7d6"/>
  <path d="M0 720 L150 560 L280 680 L420 540 L560 690 L600 640 L600 760 L0 760 Z" fill="#c4d8ec"/>
  <path d="M0 790 L200 640 L380 780 L560 640 L600 700 L600 820 L0 820 Z" fill="#aec7e2"/>
  <path d="M0 900 L600 800 L600 1296 L0 1296 Z" fill="url(#snow)"/>
  <path d="M0 900 L600 800" stroke="#eaf4fd" stroke-width="7" fill="none"/>

  <!-- brick wall -->
  <g>
    <rect x="400" y="790" width="40" height="150" fill="#b0573f"/>
    <g stroke="rgba(255,255,255,.28)" stroke-width="2">
      <line x1="400" y1="812" x2="440" y2="812"/><line x1="400" y1="836" x2="440" y2="836"/>
      <line x1="400" y1="860" x2="440" y2="860"/><line x1="400" y1="884" x2="440" y2="884"/><line x1="400" y1="908" x2="440" y2="908"/>
    </g>
    <ellipse cx="420" cy="790" rx="24" ry="7" fill="#fff"/>
  </g>
  <!-- skier mid-backflip over the wall -->
  <g transform="translate(300 700) rotate(150) scale(2.0)" stroke-linecap="round" fill="none">
    <path d="M-46 34 H50" stroke="#ffcf33" stroke-width="9"/>
    <path d="M-8 34 L0 8 M10 34 L2 8" stroke="#2b3a67" stroke-width="9"/>
    <path d="M0 8 L4 -20" stroke="#e8442c" stroke-width="12"/>
    <path d="M2 -6 L24 2" stroke="#e8442c" stroke-width="7"/>
    <circle cx="6" cy="-28" r="9" fill="#ffd9b0" stroke="none"/>
    <path d="M-4 -29 a9 9 0 0 1 18 0 Z" fill="#1f2c47" stroke="none"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="180" text-anchor="middle" font-size="76" font-weight="900" fill="#0e2f4d" letter-spacing="-2">SKI STUNT</text>
  <text x="300" y="262" text-anchor="middle" font-size="76" font-weight="900" fill="#e8442c" letter-spacing="-2">SIMULATOR</text>
  <text x="300" y="320" text-anchor="middle" font-size="30" font-weight="700" fill="#2b4a66">Flip over the wall.</text>

  <text x="300" y="1180" text-anchor="middle" font-size="30" font-weight="800" fill="#0e2f4d">Free in your browser</text>
  <text x="300" y="1224" text-anchor="middle" font-size="26" font-weight="700" fill="#4aa9e8">skistuntsimulator.com</text>
</svg>
