<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1296" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9dcff"/><stop offset="0.6" stop-color="#d7efff"/><stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3ff"/><stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1296" fill="url(#sky)"/>
  <text x="300" y="150" text-anchor="middle" font-size="62" font-weight="900" fill="#0e2f4d" letter-spacing="-1">THREE COURSES</text>
  <text x="300" y="205" text-anchor="middle" font-size="28" font-weight="700" fill="#2b4a66">Bomb the hill. Stomp the landing.</text>

  <!-- The Wall -->
  <g>
    <rect x="60" y="270" width="480" height="270" rx="24" fill="url(#tile)"/>
    <clipPath id="c1"><rect x="60" y="270" width="480" height="270" rx="24"/></clipPath>
    <g clip-path="url(#c1)">
      <path d="M60 470 L250 360 L280 420 L360 420 L540 470 L540 540 L60 540 Z" fill="#ffffff"/>
      <path d="M60 470 L250 360" stroke="#cfe0ef" stroke-width="4" fill="none"/>
      <rect x="312" y="378" width="20" height="70" fill="#b0573f"/>
      <g transform="translate(300 360) rotate(150) scale(1.1)" stroke-linecap="round" fill="none">
        <path d="M-40 30 H44" stroke="#ffcf33" stroke-width="8"/>
        <path d="M-6 30 L2 8 M10 30 L4 8" stroke="#2b3a67" stroke-width="8"/>
        <path d="M2 8 L6 -16" stroke="#e8442c" stroke-width="11"/>
        <circle cx="8" cy="-24" r="8" fill="#ffd9b0"/>
      </g>
    </g>
    <text x="88" y="512" font-size="30" font-weight="900" fill="#0e2f4d">The Wall</text>
  </g>

  <!-- The Jump -->
  <g>
    <rect x="60" y="560" width="480" height="270" rx="24" fill="url(#tile)"/>
    <clipPath id="c2"><rect x="60" y="560" width="480" height="270" rx="24"/></clipPath>
    <g clip-path="url(#c2)">
      <path d="M60 800 L260 640 L520 760 L540 760 L540 830 L60 830 Z" fill="#ffffff"/>
      <path d="M60 800 L260 640" stroke="#cfe0ef" stroke-width="4" fill="none"/>
      <g transform="translate(360 630) rotate(300) scale(1.05)" stroke-linecap="round" fill="none">
        <path d="M-40 30 H44" stroke="#3ca0ff" stroke-width="8"/>
        <path d="M-6 30 L2 8 M10 30 L4 8" stroke="#1c1f24" stroke-width="8"/>
        <path d="M2 8 L6 -16" stroke="#1c1f24" stroke-width="11"/>
        <circle cx="8" cy="-24" r="8" fill="#e8b58c"/>
      </g>
    </g>
    <text x="88" y="802" font-size="30" font-weight="900" fill="#0e2f4d">The Jump</text>
  </g>

  <!-- The Crash -->
  <g>
    <rect x="60" y="850" width="480" height="270" rx="24" fill="url(#tile)"/>
    <clipPath id="c3"><rect x="60" y="850" width="480" height="270" rx="24"/></clipPath>
    <g clip-path="url(#c3)">
      <path d="M60 930 L140 980 L200 940 L260 1010 L330 960 L400 1050 L480 1030 L540 1080 L540 1120 L60 1120 Z" fill="#ffffff"/>
      <path d="M60 930 L140 980 L200 940 L260 1010 L330 960 L400 1050 L480 1030 L540 1080" stroke="#cfe0ef" stroke-width="4" fill="none"/>
      <g transform="translate(300 980) rotate(220) scale(1.0)" stroke-linecap="round" fill="none">
        <path d="M-40 30 H44" stroke="#ff5a3c" stroke-width="8"/>
        <path d="M-6 30 L2 8 M10 30 L4 8" stroke="#9a8f80" stroke-width="8"/>
        <path d="M2 8 L6 -16" stroke="#1a1a1a" stroke-width="11"/>
        <circle cx="8" cy="-24" r="8" fill="#7b5234"/>
      </g>
    </g>
    <text x="88" y="1092" font-size="30" font-weight="900" fill="#0e2f4d">The Crash</text>
  </g>

  <text x="300" y="1210" text-anchor="middle" font-size="26" font-weight="700" fill="#4aa9e8">skistuntsimulator.com</text>
</svg>
