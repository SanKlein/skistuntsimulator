<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1296" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9dcff"/><stop offset="0.6" stop-color="#d7efff"/><stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1296" fill="url(#sky)"/>
  <circle cx="480" cy="180" r="56" fill="#fff7d6"/>
  <path d="M0 560 L160 430 L300 540 L460 420 L600 550 L600 660 L0 660 Z" fill="#c4d8ec"/>
  <path d="M0 640 L220 520 L420 650 L600 520 L600 680 L0 680 Z" fill="#aec7e2"/>

  <text x="300" y="150" text-anchor="middle" font-size="62" font-weight="900" fill="#0e2f4d" letter-spacing="-1">PICK YOUR RIDER</text>
  <text x="300" y="205" text-anchor="middle" font-size="28" font-weight="700" fill="#2b4a66">…or build your own</text>

  <!-- four character tiles -->
  <g>
    <rect x="70" y="320" width="200" height="290" rx="22" fill="#ffffff" opacity="0.55"/>
    <rect x="330" y="320" width="200" height="290" rx="22" fill="#ffffff" opacity="0.55"/>
    <rect x="70" y="700" width="200" height="290" rx="22" fill="#ffffff" opacity="0.55"/>
    <rect x="330" y="700" width="200" height="290" rx="22" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- TwosJoe: beret, white top, blue-gray pants -->
  <g transform="translate(170 540) scale(1.9)" stroke-linecap="round">
    <path d="M-26 3 H30" stroke="#ff5a3c" stroke-width="5" fill="none"/>
    <path d="M-4 0 L-1 -24 M4 0 L1 -24" stroke="#6d7b8c" stroke-width="7" fill="none"/>
    <path d="M0 -24 L2 -55" stroke="#f2f2f0" stroke-width="10" fill="none"/>
    <path d="M1 -47 L-14 -37 M1 -47 L16 -39" stroke="#f2f2f0" stroke-width="5" fill="none"/>
    <circle cx="2" cy="-63" r="8.5" fill="#e8b58c"/>
    <path d="M-4 -60 a8 8 0 0 0 13 0 Z" fill="#5a4030"/>
    <ellipse cx="2" cy="-70" rx="11" ry="5" fill="#15171b" transform="rotate(-12 2 -70)"/>
  </g>
  <text x="170" y="640" text-anchor="middle" font-size="26" font-weight="800" fill="#0e2f4d">TwosJoe</text>

  <!-- TwosBaller: auburn hair, black jacket/pants -->
  <g transform="translate(430 540) scale(1.85)" stroke-linecap="round">
    <path d="M-26 3 H30" stroke="#3ca0ff" stroke-width="5" fill="none"/>
    <path d="M-4 0 L-1 -24 M4 0 L1 -24" stroke="#1c1f24" stroke-width="7" fill="none"/>
    <path d="M0 -24 L2 -55" stroke="#1c1f24" stroke-width="10" fill="none"/>
    <path d="M1 -47 L-14 -37 M1 -47 L16 -39" stroke="#1c1f24" stroke-width="5" fill="none"/>
    <circle cx="2" cy="-63" r="8.5" fill="#e8b58c"/>
    <path d="M-6.5 -65 a8.5 8.5 0 0 1 17 0 Z" fill="#8a4b2a"/>
  </g>
  <text x="430" y="640" text-anchor="middle" font-size="26" font-weight="800" fill="#0e2f4d">TwosBaller</text>

  <!-- Popstar Benny: tall, jeans, gray hoodie, glasses -->
  <g transform="translate(170 970) scale(2.05)" stroke-linecap="round">
    <path d="M-26 3 H30" stroke="#ffcf33" stroke-width="5" fill="none"/>
    <path d="M-4 0 L-1 -26 M4 0 L1 -26" stroke="#3c5c94" stroke-width="6.5" fill="none"/>
    <path d="M0 -26 L2 -60" stroke="#c9ccc9" stroke-width="9.5" fill="none"/>
    <path d="M1 -52 L-14 -42 M1 -52 L16 -44" stroke="#c9ccc9" stroke-width="5" fill="none"/>
    <circle cx="2" cy="-68" r="8.5" fill="#5a3b28"/>
    <path d="M-6.5 -70 a8.5 8.5 0 0 1 17 0 Z" fill="#141414"/>
    <rect x="-3" y="-69" width="9" height="3" fill="#20242a"/>
  </g>
  <text x="170" y="1020" text-anchor="middle" font-size="24" font-weight="800" fill="#0e2f4d">Popstar Benny</text>

  <!-- Harlem: long black hair, black top, taupe pants -->
  <g transform="translate(430 970) scale(1.8)" stroke-linecap="round">
    <path d="M-26 3 H30" stroke="#ff5a3c" stroke-width="5" fill="none"/>
    <path d="M-4 0 L-1 -24 M4 0 L1 -24" stroke="#9a8f80" stroke-width="7" fill="none"/>
    <path d="M0 -24 L2 -55" stroke="#1a1a1a" stroke-width="10" fill="none"/>
    <path d="M1 -47 L-14 -37 M1 -47 L16 -39" stroke="#1a1a1a" stroke-width="5" fill="none"/>
    <path d="M-9 -64 q-5 16 1 30 l5 -1 q-4 -14 -1 -27 Z" fill="#0f0f10"/>
    <path d="M11 -64 q5 16 -1 30 l-5 -1 q4 -14 1 -27 Z" fill="#0f0f10"/>
    <circle cx="2" cy="-63" r="8.5" fill="#7b5234"/>
    <path d="M-7 -65 a8.5 8.5 0 0 1 18 0 Z" fill="#0f0f10"/>
  </g>
  <text x="430" y="1020" text-anchor="middle" font-size="26" font-weight="800" fill="#0e2f4d">Harlem</text>
</svg>
